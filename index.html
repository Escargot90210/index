<script>
  // Trackingpixel: registreert pagina-openeningen
  (function() {
    const img = new Image();
    img.src = "https://script.google.com/macros/s/AKfycbzwTd-3NM4RUzkmtbWsuwMn9pxr-6Vguf85TlKZebtmdmDxinTKrB47U0SJ4ivR4-zfjg/exec?pixel=1&ts=" + Date.now();
  })();

  // Klik-logging
  function logClick(email) {
    fetch(
      "https://script.google.com/macros/s/AKfycbzwTd-3NM4RUzkmtbWsuwMn9pxr-6Vguf85TlKZebtmdmDxinTKrB47U0SJ4ivR4-zfjg/exec?email="
      + encodeURIComponent(email)
      + "&ua=" + encodeURIComponent(navigator.userAgent)
      + "&ts=" + Date.now()
    )
    .then(() => console.log("Klik geregistreerd"))
    .catch(err => console.error("Logging mislukt:", err));
  }

  function showReveal() {
    document.getElementById("reveal").style.display = "block";
  }
</script>
