<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loggingcode Correct Instellen</title>
  <script>
    function logClick(email) {
      fetch("https://script.google.com/macros/s/AKfycbzwTd-3NM4RUzkmtbWsuwMn9pxr-6Vguf85TlKZebtmdmDxinTKrB47U0SJ4ivR4-zfjg/exec?email="
            + encodeURIComponent(email)
            + "&ua=" + encodeURIComponent(navigator.userAgent)
            + "&ts=" + Date.now());
    }
  </script>
</head>
<body>
  <h1>HTML Loggingcode Correct Instellen</h1>
  <p>Vul hieronder je e-mail in en klik op Verifiëren om te testen of de logging werkt.</p>
  <input type="email" id="emailInput" placeholder="Vul je e-mail in" />
  <button onclick="logClick(document.getElementById('emailInput').value)">Verifiëren</button>
  <p>Na het klikken wordt je e-mailadres naar de Google Sheet gestuurd via de loggingcode.</p>
</body>
</html>
